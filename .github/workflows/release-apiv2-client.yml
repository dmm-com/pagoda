name: Release AirOne APIv2 client npm package to GitHub npm Registry

on:
  # Publish only after code is merged into master (trusted context).
  # Fires on changes that can alter the generated OpenAPI spec (spec.yaml)
  # or the client package version.
  push:
    branches:
      - master
    paths:
      - "**/api_v2/**/*.py"
      - "apiclient/typescript-fetch/package.json"
      - ".github/workflows/release-apiv2-client.yml"

jobs:
  # Generates the client from the merged (trusted) code and publishes it.
  # Publish is skipped when the current version is already on the registry,
  # so API changes without a version bump won't fail the workflow.
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        run: pipx install uv
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.14"
          cache: "pip"
      - name: apt-get
        run: |
          sudo apt-get update
          sudo apt-get install libldap2-dev libsasl2-dev libxmlsec1-dev libmysqlclient-dev pkg-config
      - name: uv sync
        run: |
          uv sync --extra dev
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com/
          scope: "@dmm-com"
      - name: install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: generate client
        run: |
          uv run npm run generate:client
      - name: Check if the current version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published; skipping publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION is not published yet; will publish."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ./apiclient/typescript-fetch
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: publish
        if: steps.check.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        working-directory: ./apiclient/typescript-fetch
